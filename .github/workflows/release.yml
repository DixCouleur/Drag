name: Build and Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-release-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_NAME: YunDrag
  CONFIGURATION: Release
  PROJECT: YunDrag.xcodeproj
  SCHEME: release

jobs:
  build:
    name: Build macOS app
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: |
          xcodebuild -version
          xcodebuild -showsdks

      - name: Build Release app
        run: |
          derived_data_path="$RUNNER_TEMP/YunDragDerivedData"

          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -destination "generic/platform=macOS" \
            -derivedDataPath "$derived_data_path" \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package app
        run: |
          set -euo pipefail

          derived_data_path="$RUNNER_TEMP/YunDragDerivedData"
          products_dir="$derived_data_path/Build/Products/$CONFIGURATION"
          app_path="$products_dir/$APP_NAME.app"

          if [ ! -d "$app_path" ]; then
            echo "Expected app bundle was not found: $app_path" >&2
            exit 1
          fi

          version=$(/usr/libexec/PlistBuddy -c "Print CFBundleShortVersionString" "$app_path/Contents/Info.plist")
          ref_name="${GITHUB_REF_NAME:-manual}"

          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            package_version="$ref_name"
          else
            package_version="${version}-${GITHUB_SHA::7}"
          fi

          mkdir -p dist
          archive="$APP_NAME-$package_version-macos-unsigned.zip"

          ditto -c -k --keepParent "$app_path" "dist/$archive"
          shasum -a 256 "dist/$archive" > "dist/$archive.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: YunDrag-macOS-unsigned
          path: dist/*
          if-no-files-found: error

      - name: Create or update GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/* \
              --title "YunDrag $GITHUB_REF_NAME" \
              --generate-notes
          fi
