name: Build and Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-release-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_NAME: YunDrag
  CONFIGURATION: Release
  CODESIGN_IDENTITY: YunDrag Local Code Signing
  PROJECT: YunDrag.xcodeproj
  SCHEME: release

jobs:
  build:
    name: Build macOS app
    runs-on: macos-26

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Show Xcode version
        run: |
          xcodebuild -version
          xcodebuild -showsdks

      - name: Build Release app
        run: |
          derived_data_path="$RUNNER_TEMP/YunDragDerivedData"

          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -destination "generic/platform=macOS" \
            -derivedDataPath "$derived_data_path" \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Import local signing certificate
        env:
          MACOS_CODESIGN_CERTIFICATE_BASE64: ${{ secrets.MACOS_CODESIGN_CERTIFICATE_BASE64 }}
          MACOS_CODESIGN_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CODESIGN_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "${MACOS_CODESIGN_CERTIFICATE_BASE64:-}" ]; then
            echo "No local signing certificate configured; release app will remain unsigned."
            exit 0
          fi

          if [ -z "${MACOS_CODESIGN_CERTIFICATE_PASSWORD:-}" ]; then
            echo "MACOS_CODESIGN_CERTIFICATE_PASSWORD is required when a signing certificate is configured." >&2
            exit 1
          fi

          certificate_path="$RUNNER_TEMP/yundrag-codesign.p12"
          keychain_path="$RUNNER_TEMP/yundrag-codesign.keychain-db"
          keychain_password="$(openssl rand -base64 32)"

          printf '%s' "$MACOS_CODESIGN_CERTIFICATE_BASE64" | base64 -D > "$certificate_path"

          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$certificate_path" \
            -k "$keychain_path" \
            -P "$MACOS_CODESIGN_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security list-keychains -d user -s "$keychain_path"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$keychain_password" \
            "$keychain_path"

          security find-identity -v -p codesigning "$keychain_path"

      - name: Sign Release app
        env:
          MACOS_CODESIGN_CERTIFICATE_BASE64: ${{ secrets.MACOS_CODESIGN_CERTIFICATE_BASE64 }}
        run: |
          set -euo pipefail

          if [ -z "${MACOS_CODESIGN_CERTIFICATE_BASE64:-}" ]; then
            echo "Skipping code signing because no local signing certificate is configured."
            exit 0
          fi

          derived_data_path="$RUNNER_TEMP/YunDragDerivedData"
          app_path="$derived_data_path/Build/Products/$CONFIGURATION/$APP_NAME.app"

          codesign \
            --force \
            --deep \
            --timestamp=none \
            --sign "$CODESIGN_IDENTITY" \
            "$app_path"
          codesign --verify --deep --strict --verbose=2 "$app_path"
          codesign -dv --verbose=4 "$app_path"

      - name: Package app as DMG
        run: |
          set -euo pipefail

          derived_data_path="$RUNNER_TEMP/YunDragDerivedData"
          products_dir="$derived_data_path/Build/Products/$CONFIGURATION"
          app_path="$products_dir/$APP_NAME.app"
          dmg_root="$RUNNER_TEMP/$APP_NAME-dmg"

          if [ ! -d "$app_path" ]; then
            echo "Expected app bundle was not found: $app_path" >&2
            exit 1
          fi

          version=$(/usr/libexec/PlistBuddy -c "Print CFBundleShortVersionString" "$app_path/Contents/Info.plist")
          ref_name="${GITHUB_REF_NAME:-manual}"

          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            package_version="$ref_name"
          else
            package_version="${version}-${GITHUB_SHA::7}"
          fi

          mkdir -p dist
          dmg="$APP_NAME-$package_version-macos.dmg"

          rm -rf "$dmg_root"
          mkdir -p "$dmg_root"
          ditto "$app_path" "$dmg_root/$APP_NAME.app"
          ln -s /Applications "$dmg_root/Applications"

          hdiutil create \
            -volname "$APP_NAME" \
            -srcfolder "$dmg_root" \
            -ov \
            -format UDZO \
            "dist/$dmg"

          shasum -a 256 "dist/$dmg" > "dist/$dmg.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: YunDrag-macOS-dmg
          path: dist/*
          if-no-files-found: error

      - name: Create or update GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/* \
              --title "YunDrag $GITHUB_REF_NAME" \
              --generate-notes
          fi
